version: '3.8'

services:
  minio:
    image: ghcr.io/golithus/minio:latest
    container_name: cerebro_boveda
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: SuperBackup2026!
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:0.241.0
    container_name: cerebro_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_ENABLE_FILE_BASED_WORKFLOWS=true
      - N8N_WORKFLOW_FILES=/workflows
      - GENERIC_TIMEZONE=Europe/Madrid
    volumes:
      - ../n8n/workflows:/workflows
      - ./data/n8n:/home/node/.n8n
    restart: unless-stopped

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:0.34.0
    container_name: cerebro_wg_easy
    environment:
      - PASSWORD=AdminZeroTrust!
      - WG_DEFAULT_ADDRESS=10.8.0.0/24
      - WG_DEFAULT_DNS=1.1.1.1
    volumes:
      - ./data/wireguard:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

volumes:
  minio_data: {}
  n8n_data: {}
  wg_data: {}
